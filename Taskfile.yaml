version: "3"

tasks:
  default:
    desc: Build the bot binary
    cmds:
      - go build -o bin/bot ./cmd/bot

  run:
    desc: Run the bot locally
    cmds:
      - go run ./cmd/bot run

  auth:
    desc: Run Google OAuth setup
    cmds:
      - go run ./cmd/bot auth

  generate:
    desc: Generate mocks and other code
    cmds:
      - go generate ./...

  test:
    desc: Run tests with coverage
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -func=coverage.out

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  docker-build:
    desc: Build Docker image
    cmds:
      - docker build -t kitadrivebot:latest .

  docker-up:
    desc: Start bot with docker compose
    cmds:
      - docker compose up --build -d
