version: "2"

linters:
  enable:
    - bodyclose
    - dupl
    - errcheck
    - funlen
    - gocheckcompilerdirectives
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
    - whitespace

  settings:
    funlen:
      lines: -1
      statements: 50
    gocyclo:
      min-complexity: 15
    goimports:
      local-prefixes:
        - github.com/kitanoyoru/kitaDriveBot
    gosec:
      excludes:
        - G101
        - G117
        - G705

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - funlen
          - goconst

run:
  timeout: 5m
